name: RightMenu
options:
  bundleIdPrefix: com.rightmenu
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  defaultConfig: Release
  groupSortPosition: none

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: M9HUJXV356
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  RightMenu:
    type: application
    platform: macOS
    sources:
      - path: RightMenu
        excludes:
          - "*.entitlements"
      - path: Shared
    entitlements:
      path: RightMenu/RightMenu.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
    info:
      path: RightMenu/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_CN
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rightmenu.app
        PRODUCT_NAME: RightMenu
    dependencies:
      - target: FinderSyncExtension
        embed: true

  FinderSyncExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: FinderSyncExtension
        excludes:
          - "*.entitlements"
      - path: Shared
    entitlements:
      path: FinderSyncExtension/FinderSyncExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
    info:
      path: FinderSyncExtension/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_CN
        CFBundleDisplayName: RightMenu
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.FinderSync
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).FinderSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rightmenu.app.FinderSyncExtension
        PRODUCT_NAME: FinderSyncExtension
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
    dependencies:
      - sdk: FinderSync.framework
