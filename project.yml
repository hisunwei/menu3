name: menu3
options:
  bundleIdPrefix: com.menu3
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  defaultConfig: Release
  groupSortPosition: none

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: M9HUJXV356
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  menu3:
    type: application
    platform: macOS
    sources:
      - path: RightMenu
        excludes:
          - "*.entitlements"
      - path: Shared
    entitlements:
      path: RightMenu/RightMenu.entitlements
      properties:
        com.apple.security.app-sandbox: false
    info:
      path: RightMenu/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_CN
        CFBundleDisplayName: Menu3
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSAppleEventsUsageDescription: "Menu3 需要与 Finder 通信以获取当前目录和选中文件"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.menu3.app
        PRODUCT_NAME: Menu3
        OTHER_LDFLAGS:
          - "-F/System/Library/PrivateFrameworks"
          - "-framework"
          - "MultitouchSupport"
